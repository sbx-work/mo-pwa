<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MO PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-size: 12pt; }
        input[type="range"] { -webkit-appearance: none; background: #374151; height: 12px; border-radius: 6px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; background: #3b82f6; border: 3px solid white; }
        .skip-overlay { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen overflow-hidden" x-data="scoutApp()" x-init="initApp()">

    <template x-if="!authenticated">
        <div class="fixed inset-0 z-50 bg-gray-900 flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-4xl font-black mb-2 text-blue-500 tracking-tighter">MO PWA</h1>
            <p class="text-gray-500 mb-8">Newton Division | 2026</p>
            <input type="password" x-model="passwordInput" @keyup.enter="login()" class="w-full max-w-xs p-4 rounded-xl bg-gray-800 mb-4 text-center text-xl border border-gray-700 outline-none focus:border-blue-500" placeholder="Password">
            <button @click="login()" class="w-full max-w-xs bg-blue-600 py-4 rounded-xl font-bold">Launch App</button>
        </div>
    </template>

    <div class="flex flex-col h-full" x-show="authenticated" x-cloak>
        <header class="bg-gray-800 border-b border-gray-700 p-4 flex items-center justify-between shadow-lg">
            <div class="flex items-center space-x-6">
                <h1 class="font-black text-xl text-blue-500 mr-4">MO PWA</h1>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-bold uppercase">Match</span>
                    <input type="number" x-model="matchNum" @change="fetchTeams()" class="bg-gray-700 w-20 p-1 rounded font-bold text-center">
                </div>
                <div class="flex bg-gray-700 rounded-lg p-1 border border-gray-600">
                    <button @click="alliance = 'red'; fetchTeams()" :class="alliance === 'red' ? 'bg-red-600' : 'text-gray-400'" class="px-6 py-1 rounded font-bold transition">RED</button>
                    <button @click="alliance = 'blue'; fetchTeams()" :class="alliance === 'blue' ? 'bg-blue-600' : 'text-gray-400'" class="px-6 py-1 rounded font-bold transition">BLUE</button>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <button @click="showSettings = true" class="p-2 text-gray-400">⚙️</button>
                <button @click="syncData($event)" :class="pendingSync.length > 0 ? 'bg-orange-600' : 'bg-green-700'" class="px-6 py-2 rounded-lg font-bold shadow-md">
                    SYNC (<span x-text="pendingSync.length"></span>)
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-x-auto p-4 flex space-x-4 bg-black">
            <template x-for="(team, index) in teams" :key="index">
                <div class="relative flex-1 min-w-[360px] bg-gray-800 rounded-2xl flex flex-col border-b-4 overflow-hidden" :class="alliance === 'red' ? 'border-red-600' : 'border-blue-600'">
                    
                    <div x-show="formData[index].skip" class="skip-overlay absolute inset-0 z-10 flex flex-col items-center justify-center text-center p-6">
                        <p class="text-xl font-bold text-gray-400 mb-4 italic">Team Observation Skipped</p>
                        <button @click="formData[index].skip = false" class="bg-gray-700 px-6 py-2 rounded-lg">Resume Observation</button>
                    </div>

                    <div class="p-4 bg-gray-900/50 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Team #</span>
                            <input type="text" x-model="team.number" class="bg-transparent text-3xl font-black text-white w-24 border-b border-transparent focus:border-blue-500 outline-none">
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <button @click="formData[index].skip = true" class="text-[10px] text-red-400 font-bold mb-1 underline">SKIP TEAM</button>
                            <input type="text" x-model="team.name" class="bg-transparent text-sm text-blue-400 font-medium text-right w-40 outline-none">
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-6">
                        <section class="space-y-4">
                            <h3 class="text-xs font-bold text-blue-500 uppercase border-b border-gray-700 pb-1">Auto</h3>
                            <div class="flex justify-between">
                                <button @click="formData[index].autoMove = !formData[index].autoMove" :class="formData[index].autoMove ? 'bg-green-700' : 'bg-gray-700'" class="w-[48%] py-3 rounded-lg text-xs font-bold">Moves?</button>
                                <button @click="formData[index].autoShootMove = !formData[index].autoShootMove" :class="formData[index].autoShootMove ? 'bg-green-700' : 'bg-gray-700'" class="w-[48%] py-3 rounded-lg text-xs font-bold">Shoot Move?</button>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-2 text-gray-400"><span>Preload Acc</span><span class="font-bold text-blue-400" x-text="formData[index].autoPreloadAcc"></span></div>
                                <input type="range" min="1" max="10" x-model="formData[index].autoPreloadAcc" class="w-full">
                            </div>
                            <div class="flex items-center justify-between bg-gray-900/30 p-2 rounded-lg">
                                <span class="text-sm">Sweeps</span>
                                <div class="flex items-center space-x-4">
                                    <button @click="if(formData[index].autoSweeps > 0) formData[index].autoSweeps--" class="w-8 h-8 bg-gray-700 rounded-full font-bold">-</button>
                                    <span class="text-xl font-bold w-6 text-center" x-text="formData[index].autoSweeps"></span>
                                    <button @click="formData[index].autoSweeps++" class="w-8 h-8 bg-gray-700 rounded-full font-bold">+</button>
                                </div>
                            </div>
                        </section>

                        <section class="space-y-4">
                            <h3 class="text-xs font-bold text-orange-500 uppercase border-b border-gray-700 pb-1">Teleop</h3>
                            <div>
                                <div class="flex justify-between text-xs mb-2 text-gray-400"><span>Shoot Acc</span><span class="font-bold text-orange-400" x-text="formData[index].teleAcc"></span></div>
                                <input type="range" min="1" max="10" x-model="formData[index].teleAcc" class="w-full">
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-2 text-gray-400"><span>Align Rating</span><span class="font-bold text-orange-400" x-text="formData[index].teleAutoAlign"></span></div>
                                <input type="range" min="0" max="10" x-model="formData[index].teleAutoAlign" class="w-full">
                            </div>
                            <div>
                                <span class="text-[10px] text-gray-500 font-bold uppercase block mb-2">Climb Level</span>
                                <div class="flex space-x-1">
                                    <template x-for="lvl in [0,1,2,3]">
                                        <button @click="formData[index].climbLvl = lvl" :class="formData[index].climbLvl === lvl ? 'bg-orange-600' : 'bg-gray-700'" class="flex-1 py-3 rounded-lg font-bold" x-text="lvl == 0 ? 'None' : lvl"></button>
                                    </template>
                                </div>
                            </div>
                        </section>

                        <textarea x-model="formData[index].comments" placeholder="Notes..." class="w-full bg-gray-950 border border-gray-700 p-3 rounded-xl h-24 text-sm focus:border-blue-500 outline-none"></textarea>
                    </div>
                </div>
            </template>
        </main>

        <footer class="p-4 bg-gray-800 border-t border-gray-700">
            <button @click="submitMatch()" class="w-full bg-blue-600 py-6 rounded-2xl font-black text-2xl shadow-xl transition-transform active:scale-95">
                SAVE MATCH & NEXT
            </button>
        </footer>

        <div x-show="showSettings" class="fixed inset-0 z-40 bg-black/90 flex items-center justify-center p-6" x-cloak>
            <div class="bg-gray-800 p-8 rounded-3xl w-full max-w-lg border border-gray-700 shadow-2xl">
                <h2 class="text-2xl font-bold mb-6">Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Google Web App URL</label>
                        <input type="text" x-model="sheetUrl" class="w-full p-4 bg-gray-900 rounded-xl mt-1 border border-gray-700">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">TBA Event Key</label>
                        <input type="text" x-model="eventKey" class="w-full p-4 bg-gray-900 rounded-xl mt-1 border border-gray-700">
                    </div>
                </div>
                <button @click="saveSettings()" class="w-full bg-blue-600 mt-8 py-4 rounded-xl font-bold">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        function scoutApp() {
            return {
                authenticated: false,
                passwordInput: '',
                showSettings: false,
                matchNum: 1,
                alliance: 'red',
                eventKey: '2026new',
                sheetUrl: localStorage.getItem('mo_sheetUrl_v2') || '',
                tbaKey: '0DRn5X0aCfSzLQiG4HyL8r0ncrjhzRKgFj5bZEfrFjCdfe2NB653OI7rg76wkyJ5',
                teams: [{number: '---', name: ''},{number: '---', name: ''},{number: '---', name: ''}],
                formData: [],
                pendingSync: JSON.parse(localStorage.getItem('mo_sync_v2') || '[]'),

                initApp() {
                    this.resetFormData();
                    this.fetchTeams();
                },

                login() {
                    if (this.passwordInput === 'Newton2026') this.authenticated = true;
                    else alert('Access Denied');
                },

                resetFormData() {
                    this.formData = Array.from({ length: 3 }, () => ({
                        autoPreloadAcc: 5, autoMove: false, autoSweeps: 0, autoShootMove: false, 
                        climbLvl: 0, teleAcc: 5, teleAutoAlign: 0, comments: '', skip: false
                    }));
                },

                async fetchTeams() {
                    try {
                        const res = await fetch(`https://www.thebluealliance.com/api/v3/event/${this.eventKey}/matches/simple`, {
                            headers: { 'X-TBA-Auth-Key': this.tbaKey }
                        });
                        const matches = await res.json();
                        const match = matches.find(m => m.match_number == this.matchNum && m.comp_level == 'qm');
                        if (match) {
                            const keys = match.alliances[this.alliance].team_keys;
                            this.teams = keys.map(k => ({ number: k.replace('frc', ''), name: `Team ${k.replace('frc', '')}` }));
                        }
                    } catch (e) { console.warn("TBA offline"); }
                },

                submitMatch() {
                    this.teams.forEach((t, i) => {
                        if (!this.formData[i].skip) {
                            this.pendingSync.push({
                                matchNum: this.matchNum,
                                teamNum: t.number,
                                alliance: this.alliance,
                                ...this.formData[i],
                                timestamp: new Date().toLocaleString()
                            });
                        }
                    });

                    localStorage.setItem('mo_sync_v2', JSON.stringify(this.pendingSync));
                    this.matchNum++;
                    this.resetFormData();
                    this.fetchTeams();
                    window.scrollTo(0,0);
                },

                async syncData(e) {
                    if (!this.sheetUrl) return alert("Missing Sheet URL!");
                    const btn = e.target;
                    btn.innerText = "Syncing...";
                    
                    try {
                        // Use text/plain to bypass pre-flight CORS
                        await fetch(this.sheetUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(this.pendingSync)
                        });

                        this.pendingSync = [];
                        localStorage.setItem('mo_sync_v2', '[]');
                        alert("Sync successful! Check your spreadsheet.");
                    } catch (err) {
                        alert("Sync failed. Check logs.");
                    } finally {
                        btn.innerText = "SYNC DATA";
                    }
                },

                saveSettings() {
                    localStorage.setItem('mo_sheetUrl_v2', this.sheetUrl);
                    this.showSettings = false;
                }
            }
        }
    </script>
</body>
</html>
